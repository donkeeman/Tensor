name: Keep Alive

on:
  schedule:
    # 매시 정각 (UTC) — 웹훅 복구 + Supabase pause 방지
    - cron: '0 * * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Edge Function
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://yxaxnvjsowuactcjvvxp.supabase.co/functions/v1/telegram-bot")
          echo "Status: $response"
          if [ "$response" != "200" ]; then
            echo "::warning::Edge Function returned $response"
          fi
